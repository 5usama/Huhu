<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistan Free Internet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a, #1a1f3a, #0d1428);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3.2rem;
            background: linear-gradient(90deg, #00d4ff, #00ff88, #00d4ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            letter-spacing: 2px;
        }

        .header .subtitle {
            color: #00d4ff;
            font-size: 1.3rem;
            margin-top: 5px;
            font-weight: 300;
            letter-spacing: 3px;
            -webkit-text-fill-color: #00d4ff;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SOCIAL BAR - Top par sticky */
        .social-bar-container {
            background: rgba(30, 39, 64, 0.95);
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 10px;
            z-index: 999;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .social-bar-container #socialBar {
            width: 100%;
        }

        .section {
            background: rgba(20, 27, 43, 0.7);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 6px solid #00d4ff;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .section:hover {
            transform: translateY(-5px) scale(1.01);
            border-left-color: #00ff88;
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.15);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .icon {
            font-size: 2.2rem;
        }

        .section-title .badge {
            font-size: 0.8rem;
            background: #00d4ff;
            color: #000;
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-left: 10px;
        }

        .section-title .badge.coming {
            background: #ff6b35;
            color: #fff;
        }

        .files-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .file-btn {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            color: #000;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        .file-btn:hover {
            transform: scale(1.08);
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            box-shadow: 0 6px 30px rgba(0, 255, 136, 0.4);
        }

        .coming-soon-text {
            color: #ff6b35;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 20px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 30px;
            display: inline-block;
            border: 1px dashed #ff6b35;
        }

        .credit-section {
            text-align: center;
            padding: 25px 0 15px;
            margin-top: 20px;
            border-top: 2px solid rgba(0, 212, 255, 0.15);
        }

        .credit-section .credit-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .credit-section .credit-role {
            color: #aaa;
            font-size: 1rem;
            margin-top: 2px;
            -webkit-text-fill-color: #aaa;
        }

        /* Popunder - Footer ke neeche */
        .popunder-container {
            background: rgba(30, 39, 64, 0.8);
            padding: 10px;
            border-radius: 16px;
            margin: 25px 0 10px;
            border: 1px solid rgba(255, 107, 53, 0.2);
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            text-align: center;
            padding: 20px 0 5px;
            color: #555;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 20px;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer a:hover {
            color: #00ff88;
            text-decoration: underline;
        }

        .footer .date {
            color: #444;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .header .subtitle {
                font-size: 1rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
            .file-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }
            .files-list {
                flex-direction: column;
            }
            .credit-section .credit-name {
                font-size: 1.6rem;
            }
            .social-bar-container {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>
